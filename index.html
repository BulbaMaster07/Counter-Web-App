<html lang="en">
<head>
    <title>Counter Web Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Counter Web Application</h1>

        <div id="counter">0</div>

        <p id="status">Status: Zero</p>

        <div class="custom-box">
            <label>Custom Value:</label>
            <input type="number" id="customValue" value="5">
        </div>
        <div class="button-group">
            <button id="incrementBtn">Increment</button>
            <button id="decrementBtn">Decrement</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="button-group">
            <button id="plusFiveBtn">+ Custom</button>
            <button id="minusFiveBtn">- Custom</button>
        </div>

        <small>
            Keyboard Controls:
            Increment |
            Decrement |
            Double Click Reset Button to Reset
        </small>
    </div>

    <audio id="clickSound">
        <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
